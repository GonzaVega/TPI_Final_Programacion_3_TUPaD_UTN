<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Food Store</title>
    <link rel="stylesheet" href="./login.css" />
  </head>
  <body class="registro-body">
    <div class="container">
      <form class="login-form registro-form">
        <h1>Food Store</h1>
        <h2>Crear cuenta</h2>
        <p id="register-message" class="form-message" hidden></p>
        <div class="form-group">
          <label for="firstName">Nombre</label>
          <input type="text" id="firstName" />
        </div>
        <div class="form-group">
          <label for="lastName">Apellido</label>
          <input type="text" id="lastName" />
        </div>
        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" required />
        </div>
        <div class="form-group">
          <label for="phone">Teléfono</label>
          <input type="tel" id="phone" />
        </div>
        <div class="form-group">
          <label for="password">Contraseña *</label>
          <input type="password" id="password" required minlength="6" />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Repetir contraseña *</label>
          <input type="password" id="confirmPassword" required minlength="6" />
        </div>
        <button type="submit">Registrarme</button>
        <p class="register-link">
          ¿Ya tenés cuenta?
          <a href="./login.html">Iniciá sesión acá</a>
        </p>
      </form>
    </div>
    <script type="module" src="../../../../src/routeGuard.ts"></script>
    <script type="module" src="../../../../src/auth/registro.ts"></script>
  </body>
</html>
