<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrito - Food Store</title>
    <link rel="stylesheet" href="../../../../src/style.css" />
    <link rel="stylesheet" href="./cart.css" />
  </head>
  <body class="store-page cart-page">
    <header>
      <h1 class="navbar-title">Food Store</h1>
      <nav>
        <ul class="navbar-menu"></ul>
      </nav>
      <hr />
    </header>

    <main>
      <h2>Mi Carrito</h2>

      <section class="cart-layout">
        <section class="cart-items" data-cart-items></section>

        <aside class="cart-summary">
          <h3>Resumen del Pedido</h3>
          <div class="cart-summary-line">
            <span>Subtotal:</span>
            <strong data-summary-subtotal>$0.00</strong>
          </div>
          <div class="cart-summary-line">
            <span>Envío:</span>
            <strong data-summary-shipping>$0.00</strong>
          </div>
          <hr />
          <div class="cart-summary-total">
            <span>Total:</span>
            <strong data-summary-total>$0.00</strong>
          </div>
          <button type="button" id="checkout-btn">Proceder al Pago</button>
          <button type="button" class="danger" id="clear-cart-btn">
            Vaciar Carrito
          </button>
        </aside>
      </section>
    </main>

    <footer>
      <p>
        Derechos reservados Food Store S.A.; 2026<br />Contacto:
        info@foodstore.com
      </p>
    </footer>

    <script type="module" src="../../../../src/routeGuard.ts"></script>
    <script type="module" src="./cart.ts"></script>
    <script type="module" src="../../../../src/auth/logout.ts"></script>
  </body>
</html>
