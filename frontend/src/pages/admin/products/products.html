<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos - Food Store Admin</title>
    <link rel="stylesheet" href="../../../../src/style.css" />
    <link rel="stylesheet" href="/src/pages/admin/adminHome/adminHome.css" />
    <link rel="stylesheet" href="./products.css" />
  </head>
  <body class="admin-page">
    <header>
      <h1 class="navbar-title">Food Store</h1>
      <nav>
        <ul class="navbar-menu"></ul>
      </nav>
      <hr />
    </header>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <h2>Administración</h2>
        <nav>
          <ul>
            <li><a href="/src/pages/admin/adminHome/adminHome.html">Dashboard</a></li>
            <li><a href="/src/pages/admin/categories/categories.html">Categorías</a></li>
            <li><a href="/src/pages/admin/products/products.html" class="active">Productos</a></li>
            <li><a href="/src/pages/admin/orders/orders.html">Pedidos</a></li>
            <li><a href="/src/pages/store/home/home.html">Ver Tienda</a></li>
          </ul>
        </nav>
        <div class="admin-sidebar-footer">
          <a href="#" id="logout-link">Cerrar Sesión</a>
        </div>
      </aside>
      <main class="admin-main">
        <div class="admin-main-content">
          <div class="products-header">
            <h1>Gestión de Productos</h1>
            <button id="create-product-btn">+ Nuevo Producto</button>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th data-label="ID">ID</th>
                  <th data-label="Imagen">Imagen</th>
                  <th data-label="Nombre">Nombre</th>
                  <th data-label="Descripción">Descripción</th>
                  <th data-label="Precio">Precio</th>
                  <th data-label="Categoría">Categoría</th>
                  <th data-label="Stock">Stock</th>
                  <th data-label="Estado">Estado</th>
                  <th data-label="Acciones">Acciones</th>
                </tr>
              </thead>
              <tbody id="products-table-body"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="../../../../src/routeGuard.ts"></script>
    <script type="module" src="./products.ts"></script>
    <script type="module" src="../../../../src/auth/logout.ts"></script>
  </body>
</html>
