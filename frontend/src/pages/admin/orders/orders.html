<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedidos - Food Store Admin</title>
    <link rel="stylesheet" href="../../../../src/style.css" />
    <link rel="stylesheet" href="/src/pages/admin/adminHome/adminHome.css" />
    <link rel="stylesheet" href="./orders.css" />
  </head>
  <body class="admin-page">
    <header>
      <h1 class="navbar-title">Food Store</h1>
      <nav>
        <ul class="navbar-menu"></ul>
      </nav>
      <hr />
    </header>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <h2>Administración</h2>
        <nav>
          <ul>
            <li><a href="/src/pages/admin/adminHome/adminHome.html">Dashboard</a></li>
            <li><a href="/src/pages/admin/categories/categories.html">Categorías</a></li>
            <li><a href="/src/pages/admin/products/products.html">Productos</a></li>
            <li><a href="/src/pages/admin/orders/orders.html" class="active">Pedidos</a></li>
            <li><a href="/src/pages/store/home/home.html">Ver Tienda</a></li>
          </ul>
        </nav>
        <div class="admin-sidebar-footer">
          <a href="#" id="logout-link">Cerrar Sesión</a>
        </div>
      </aside>
      <main class="admin-main">
        <div class="admin-main-content">
          <div class="orders-header">
            <h1>Gestión de Pedidos</h1>
            <div class="orders-filter">
              <label for="status-filter">Filtrar por estado:</label>
              <select id="status-filter">
                <option value="TODOS">Todos</option>
                <option value="PENDIENTE">Pendiente</option>
                <option value="CONFIRMADO">Confirmado</option>
                <option value="TERMINADO">Terminado</option>
                <option value="CANCELADO">Cancelado</option>
              </select>
            </div>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th data-label="ID">ID</th>
                  <th data-label="Cliente">Cliente</th>
                  <th data-label="Fecha">Fecha</th>
                  <th data-label="Estado">Estado</th>
                  <th data-label="Productos">Productos</th>
                  <th data-label="Total">Total</th>
                </tr>
              </thead>
              <tbody id="orders-table-body"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="../../../../src/routeGuard.ts"></script>
    <script type="module" src="./orders.ts"></script>
    <script type="module" src="../../../../src/auth/logout.ts"></script>
  </body>
</html>
